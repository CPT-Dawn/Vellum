[package]
name = "vellum-core"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license-file.workspace = true

[lib]
name = "vellum_core"
path = "src/lib.rs"

[dependencies]
common = { workspace = true }

waybackend = { version = "0.10.1", default-features = false }
libc = "0.2.183"
rustix = { version = "1.1", default-features = false, features = [
    "event",
    "runtime",
    "stdio",
    "termios",
] }
smallvec = { version = "1.15.1", default-features = false, features = [
    "union",
] }
thiserror = "2.0.18"

[build-dependencies]
waybackend-scanner = { version = "0.10.1", features = ["build-script"] }
