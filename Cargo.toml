[workspace]
members = ["crates/vellum-ipc", "crates/vellumd", "crates/vellum-tui"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/yourname/vellum"
homepage = "https://github.com/yourname/vellum"
readme = "README.md"
rust-version = "1.78"

[workspace.dependencies]
anyhow = "1.0"
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tokio = { version = "1.43", features = [
    "macros",
    "rt-multi-thread",
    "net",
    "signal",
    "time",
    "sync",
    "io-util",
] }
clap = { version = "4.5", features = ["derive"] }

[profile.release]
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"
