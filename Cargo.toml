[package]
name = "awww-tui"
version = "0.1.0"
edition = "2021"
description = "Feature-rich Wayland wallpaper TUI powered by awww"
license = "MIT"

[dependencies]
crossterm = { version = "0.28", default-features = false, features = [
    "events",
] }
ratatui = { version = "0.29", default-features = false, features = [
    "crossterm",
] }
tokio = { version = "1.44", features = [
    "macros",
    "rt-multi-thread",
    "time",
    "process",
    "sync",
] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
directories = "5.0"
fuzzy-matcher = "0.3"
